<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cosmic Silence</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    canvas#space {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    .nebula {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background:
        radial-gradient(ellipse 70% 45% at 15% 25%, rgba(80, 0, 120, 0.35) 0%, transparent 70%),
        radial-gradient(ellipse 55% 60% at 85% 70%, rgba(0, 40, 120, 0.30) 0%, transparent 70%),
        radial-gradient(ellipse 40% 50% at 55% 10%, rgba(20, 80, 100, 0.25) 0%, transparent 70%),
        radial-gradient(ellipse 60% 35% at 30% 85%, rgba(100, 20, 60, 0.20) 0%, transparent 70%);
      animation: nebulaShift 30s ease-in-out infinite alternate;
    }

    @keyframes nebulaShift {
      0%   { opacity: 0.8; filter: hue-rotate(0deg); }
      50%  { opacity: 1.0; filter: hue-rotate(20deg); }
      100% { opacity: 0.7; filter: hue-rotate(-15deg); }
    }

    .content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 1.6rem;
      text-align: center;
      padding: 2rem;
    }

    .logo {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      border: 2px solid rgba(160, 120, 255, 0.5);
      box-shadow: 0 0 24px rgba(130, 80, 255, 0.6), 0 0 60px rgba(130, 80, 255, 0.2);
      animation: logoPulse 4s ease-in-out infinite;
    }

    @keyframes logoPulse {
      0%, 100% { box-shadow: 0 0 24px rgba(130, 80, 255, 0.6), 0 0 60px rgba(130, 80, 255, 0.2); }
      50%       { box-shadow: 0 0 36px rgba(160, 100, 255, 0.9), 0 0 90px rgba(130, 80, 255, 0.35); }
    }

    h1 {
      font-size: clamp(2.4rem, 7vw, 5rem);
      font-weight: 300;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #fff;
      text-shadow:
        0 0 12px rgba(180, 140, 255, 0.9),
        0 0 40px rgba(130, 80, 255, 0.5),
        0 0 80px rgba(100, 50, 200, 0.3);
      animation: titleGlow 5s ease-in-out infinite alternate;
    }

    @keyframes titleGlow {
      0%   { text-shadow: 0 0 12px rgba(180,140,255,0.9), 0 0 40px rgba(130,80,255,0.5), 0 0 80px rgba(100,50,200,0.3); }
      100% { text-shadow: 0 0 20px rgba(200,170,255,1),   0 0 60px rgba(160,100,255,0.7), 0 0 120px rgba(120,60,220,0.4); }
    }

    .tagline {
      font-size: clamp(0.8rem, 2vw, 1.05rem);
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: rgba(190, 160, 255, 0.65);
    }

    .github-link {
      margin-top: 0.6rem;
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.65rem 1.6rem;
      border: 1px solid rgba(160, 120, 255, 0.4);
      border-radius: 999px;
      color: rgba(210, 190, 255, 0.85);
      text-decoration: none;
      font-size: 0.85rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      backdrop-filter: blur(6px);
      background: rgba(80, 40, 140, 0.15);
      transition: all 0.35s ease;
    }

    .github-link:hover {
      background: rgba(110, 60, 200, 0.3);
      border-color: rgba(190, 150, 255, 0.7);
      color: #fff;
      box-shadow: 0 0 20px rgba(130, 80, 255, 0.4);
    }

    .github-link svg {
      width: 18px; height: 18px;
      fill: currentColor;
      flex-shrink: 0;
    }

    .divider {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(160,120,255,0.5), transparent);
    }
  </style>
</head>
<body>

<canvas id="space"></canvas>
<div class="nebula"></div>

<div class="content">
  <img class="logo"
       src="https://avatars.githubusercontent.com/u/cosmicsilence"
       onerror="this.style.display='none'"
       alt="Cosmic Silence" />

  <div class="divider"></div>
  <h1>Cosmic Silence</h1>
  <p class="tagline">Open source from across the universe</p>
  <div class="divider"></div>

  <a class="github-link" href="https://github.com/cosmicsilence" target="_blank" rel="noopener">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577
               0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7
               3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236
               1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93
               0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23
               .96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23
               3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805
               5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0
               .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/>
    </svg>
    github.com/cosmicsilence
  </a>
</div>

<script>
(function () {
  const canvas = document.getElementById('space');
  const ctx = canvas.getContext('2d');

  let W, H, stars, shootingStars;

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
    initStars();
  }

  function rand(min, max) { return Math.random() * (max - min) + min; }

  function initStars() {
    const count = Math.floor((W * H) / 3000);
    stars = Array.from({ length: count }, () => ({
      x: rand(0, W),
      y: rand(0, H),
      r: rand(0.3, 1.8),
      alpha: rand(0.3, 1),
      speed: rand(0.003, 0.015),
      phase: rand(0, Math.PI * 2),
      color: pickStarColor(),
    }));
    shootingStars = [];
  }

  function pickStarColor() {
    const palette = [
      'rgba(255,255,255,',
      'rgba(200,180,255,',
      'rgba(180,220,255,',
      'rgba(255,220,180,',
    ];
    return palette[Math.floor(Math.random() * palette.length)];
  }

  function spawnShootingStar() {
    if (shootingStars.length >= 4) return;
    const fromTop = Math.random() < 0.5;
    shootingStars.push({
      x:     fromTop ? rand(0, W) : rand(-100, 0),
      y:     fromTop ? rand(-100, 0) : rand(0, H * 0.5),
      vx:    rand(6, 14),
      vy:    rand(3, 8),
      len:   rand(80, 180),
      alpha: 1,
      decay: rand(0.012, 0.025),
    });
  }

  let lastShoot = 0;
  let nextShootDelay = rand(1500, 4000);

  function draw(ts) {
    ctx.clearRect(0, 0, W, H);

    // Stars
    for (const s of stars) {
      const t = ts * s.speed + s.phase;
      const a = s.alpha * (0.6 + 0.4 * Math.sin(t));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = s.color + a + ')';
      ctx.fill();
    }

    // Shooting stars
    if (ts - lastShoot > nextShootDelay) {
      spawnShootingStar();
      lastShoot = ts;
      nextShootDelay = rand(1200, 4500);
    }

    for (let i = shootingStars.length - 1; i >= 0; i--) {
      const s = shootingStars[i];
      const tailX = s.x - (s.vx / Math.hypot(s.vx, s.vy)) * s.len;
      const tailY = s.y - (s.vy / Math.hypot(s.vx, s.vy)) * s.len;
      const grad = ctx.createLinearGradient(tailX, tailY, s.x, s.y);
      grad.addColorStop(0, `rgba(255,255,255,0)`);
      grad.addColorStop(1, `rgba(220,200,255,${s.alpha})`);
      ctx.beginPath();
      ctx.moveTo(tailX, tailY);
      ctx.lineTo(s.x, s.y);
      ctx.strokeStyle = grad;
      ctx.lineWidth = 1.5;
      ctx.stroke();

      s.x += s.vx;
      s.y += s.vy;
      s.alpha -= s.decay;
      if (s.alpha <= 0 || s.x > W + 200 || s.y > H + 200) {
        shootingStars.splice(i, 1);
      }
    }

    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', resize);
  resize();
  requestAnimationFrame(draw);
})();
</script>
</body>
</html>
