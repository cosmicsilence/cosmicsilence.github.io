<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cosmic Silence</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    canvas#space {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    .galaxy-bg {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background: url('avatar.png') center center / 100vmin no-repeat;
      opacity: 0.35;
      filter: blur(1px) saturate(1.6);
      animation: galaxyRotate 180s linear infinite, galaxyPulse 20s ease-in-out infinite alternate;
    }

    @keyframes galaxyRotate {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    @keyframes galaxyPulse {
      0%   { opacity: 0.28; }
      50%  { opacity: 0.42; }
      100% { opacity: 0.32; }
    }

    .nebula {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background:
        radial-gradient(ellipse 70% 45% at 15% 25%, rgba(80, 0, 120, 0.35) 0%, transparent 70%),
        radial-gradient(ellipse 55% 60% at 85% 70%, rgba(0, 40, 120, 0.30) 0%, transparent 70%),
        radial-gradient(ellipse 40% 50% at 55% 10%, rgba(20, 80, 100, 0.25) 0%, transparent 70%),
        radial-gradient(ellipse 60% 35% at 30% 85%, rgba(100, 20, 60, 0.20) 0%, transparent 70%);
      animation: nebulaShift 30s ease-in-out infinite alternate;
    }

    @keyframes nebulaShift {
      0%   { opacity: 0.8; filter: hue-rotate(0deg); }
      50%  { opacity: 1.0; filter: hue-rotate(20deg); }
      100% { opacity: 0.7; filter: hue-rotate(-15deg); }
    }

    .content {
      position: relative;
      z-index: 3;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 1.6rem;
      text-align: center;
      padding: 2rem;
      margin-top: 0;
    }

    h1 {
      font-size: clamp(1.4rem, 7.5vw, 5rem);
      font-weight: 300;
      letter-spacing: 0.18em;
      white-space: nowrap;
      text-transform: uppercase;
      color: #fff;
      text-shadow:
        0 0 12px rgba(180, 140, 255, 0.9),
        0 0 40px rgba(130, 80, 255, 0.5),
        0 0 80px rgba(100, 50, 200, 0.3);
      animation: titleGlow 5s ease-in-out infinite alternate;
    }

    @keyframes titleGlow {
      0%   { text-shadow: 0 0 12px rgba(180,140,255,0.9), 0 0 40px rgba(130,80,255,0.5), 0 0 80px rgba(100,50,200,0.3); }
      100% { text-shadow: 0 0 20px rgba(200,170,255,1),   0 0 60px rgba(160,100,255,0.7), 0 0 120px rgba(120,60,220,0.4); }
    }

    .tagline {
      font-size: clamp(0.8rem, 2vw, 1.05rem);
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: rgba(190, 160, 255, 0.65);
    }

    @media (max-width: 500px) {
      h1 { letter-spacing: 0.08em; }
    }

    .divider {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(160,120,255,0.5), transparent);
    }

    .sponsor-link {
      position: fixed;
      bottom: 1.6rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 4;
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      color: rgba(255, 150, 180, 0.5);
      text-decoration: none;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: color 0.3s ease;
    }

    .sponsor-link:hover {
      color: rgba(255, 150, 180, 0.9);
    }

    .sponsor-link svg {
      width: 14px; height: 14px;
      fill: currentColor;
    }
  </style>
</head>
<body>

<canvas id="space"></canvas>
<div class="galaxy-bg"></div>
<div class="nebula"></div>

<div class="content">
  <h1>Cosmic Silence</h1>
  <p class="tagline">Building in the void</p>
  <div class="divider"></div>

</div>

<a class="sponsor-link" href="https://github.com/sponsors/cosmicsilence" target="_blank" rel="noopener">
  <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
    <path d="M7.655 14.916 3 10.30a4.113 4.113 0 0 1 0-5.817 4.112 4.112 0 0 1 5.817 0l.183.184.184-.184a4.112 4.112 0 0 1 5.817 5.817l-4.655 4.616a.75.75 0 0 1-1.09 0Z"/>
  </svg>
  Sponsor
</a>

<script>
(function () {
  const canvas = document.getElementById('space');
  const ctx = canvas.getContext('2d');

  let W, H, stars, shootingStars;

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
    initStars();
  }

  function rand(min, max) { return Math.random() * (max - min) + min; }

  function initStars() {
    const count = Math.floor((W * H) / 3000);
    stars = Array.from({ length: count }, () => ({
      x: rand(0, W),
      y: rand(0, H),
      r: rand(0.3, 1.8),
      alpha: rand(0.3, 1),
      speed: rand(0.003, 0.015),
      phase: rand(0, Math.PI * 2),
      color: pickStarColor(),
    }));
    shootingStars = [];
  }

  function pickStarColor() {
    const palette = [
      'rgba(255,255,255,',
      'rgba(200,180,255,',
      'rgba(180,220,255,',
      'rgba(255,220,180,',
    ];
    return palette[Math.floor(Math.random() * palette.length)];
  }

  function spawnShootingStar() {
    if (shootingStars.length >= 4) return;
    const fromTop = Math.random() < 0.5;
    shootingStars.push({
      x:     fromTop ? rand(0, W) : rand(-100, 0),
      y:     fromTop ? rand(-100, 0) : rand(0, H * 0.5),
      vx:    rand(6, 14),
      vy:    rand(3, 8),
      len:   rand(80, 180),
      alpha: 1,
      decay: rand(0.012, 0.025),
    });
  }

  let lastShoot = 0;
  let nextShootDelay = rand(1500, 4000);

  function draw(ts) {
    ctx.clearRect(0, 0, W, H);

    // Stars
    for (const s of stars) {
      const t = ts * s.speed + s.phase;
      const a = s.alpha * (0.6 + 0.4 * Math.sin(t));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = s.color + a + ')';
      ctx.fill();
    }

    // Shooting stars
    if (ts - lastShoot > nextShootDelay) {
      spawnShootingStar();
      lastShoot = ts;
      nextShootDelay = rand(1200, 4500);
    }

    for (let i = shootingStars.length - 1; i >= 0; i--) {
      const s = shootingStars[i];
      const tailX = s.x - (s.vx / Math.hypot(s.vx, s.vy)) * s.len;
      const tailY = s.y - (s.vy / Math.hypot(s.vx, s.vy)) * s.len;
      const grad = ctx.createLinearGradient(tailX, tailY, s.x, s.y);
      grad.addColorStop(0, `rgba(255,255,255,0)`);
      grad.addColorStop(1, `rgba(220,200,255,${s.alpha})`);
      ctx.beginPath();
      ctx.moveTo(tailX, tailY);
      ctx.lineTo(s.x, s.y);
      ctx.strokeStyle = grad;
      ctx.lineWidth = 1.5;
      ctx.stroke();

      s.x += s.vx;
      s.y += s.vy;
      s.alpha -= s.decay;
      if (s.alpha <= 0 || s.x > W + 200 || s.y > H + 200) {
        shootingStars.splice(i, 1);
      }
    }

    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', resize);
  resize();
  requestAnimationFrame(draw);
})();
</script>
</body>
</html>
